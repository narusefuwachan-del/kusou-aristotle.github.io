<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Character | 空想世界アリストテレス</title>
<link rel="icon" href="/favicon.png">

<style>
@font-face{
  font-family:"Kazuki Reiwa";
  src:url("/fonts/KazukiReiwa-Light.ttf") format("truetype");
  font-weight:300;
  font-style:normal;
  font-display:swap;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body,button{
  font-family:"Kazuki Reiwa","Shippori Mincho","Yu Mincho",serif;
}
body{
  background:#0b0b0f;
  color:#fff;
  overflow-x:hidden;
  animation:pageFade .45s ease both;
}
@keyframes pageFade{
  from{opacity:0;filter:blur(4px)}
  to{opacity:1;filter:blur(0)}
}

.header{
  position:sticky;
  top:0;
  z-index:60;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.site-title{
  font-size:18px;
  letter-spacing:.08em;
  color:#fff;
  text-decoration:none;
}
.menu-btn{
  font-size:22px;
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
}

/* ===== 神殿案内図 ===== */
.mapOverlay{
  position:fixed;
  inset:0;
  z-index:1000;
  background:rgba(0,0,0,.76);
  opacity:0;
  pointer-events:none;
  transition:opacity .35s ease;
  display:grid;
  place-items:center;
  padding:18px;
}
.mapOverlay.open{opacity:1;pointer-events:auto}
.mapPanel{
  position:relative;
  width:min(96vw,720px);
  aspect-ratio:1/1;
  opacity:0;
  transform:scale(.96);
  transition:opacity .42s ease,transform .42s ease;
  filter:drop-shadow(0 24px 80px rgba(0,0,0,.75));
}
.mapOverlay.open .mapPanel{opacity:1;transform:scale(1)}
.mapBase,.mapSandou{
  position:absolute;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}
.mapBase{
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:1;
}
.mapSandou{
  left:50%;
  top:50%;
  width:30%;
  height:auto;
  transform:translate(-50%,-50%);
  z-index:4;
  filter:drop-shadow(0 0 16px rgba(255,255,255,.22));
}
.mapCross{
  position:absolute;
  left:50%;
  top:50%;
  width:54%;
  height:54%;
  transform:translate(-50%,-50%);
  z-index:2;
  pointer-events:none;
}
.mapCross::before,.mapCross::after{
  content:"";
  position:absolute;
  background:rgba(255,255,255,.78);
  box-shadow:0 0 16px rgba(255,255,255,.55);
  border-radius:999px;
}
.mapCross::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%)}
.mapCross::after{left:0;top:50%;width:100%;height:2px;transform:translateY(-50%)}
.mapCrossCenter{
  position:absolute;
  left:50%;
  top:50%;
  z-index:3;
  width:28px;
  height:28px;
  transform:translate(-50%,-50%) rotate(45deg);
  border:1px solid rgba(255,255,255,.72);
  box-shadow:0 0 16px rgba(255,255,255,.45);
  pointer-events:none;
}
.mapTitleFrame{
  position:absolute;
  left:50%;
  top:4%;
  transform:translateX(-50%);
  z-index:20;
  min-width:48%;
  padding:6px 16px 7px;
  border:1px solid rgba(255,255,255,.42);
  background:rgba(0,0,0,.34);
  text-align:center;
  pointer-events:none;
}
.mapTitle{
  font-size:clamp(16px,3.8vw,28px);
  letter-spacing:.18em;
  white-space:nowrap;
}
.mapNote{
  position:absolute;
  left:0;
  right:0;
  bottom:5.5%;
  z-index:20;
  text-align:center;
  font-size:clamp(10px,2.5vw,14px);
  letter-spacing:.08em;
  opacity:.78;
  pointer-events:none;
}
.mapClose{
  position:fixed;
  top:14px;
  right:16px;
  z-index:1010;
  width:42px;
  height:42px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(0,0,0,.45);
  color:#fff;
  font-size:20px;
  cursor:pointer;
}
.placeLabel{
  position:absolute;
  z-index:22;
  min-width:90px;
  padding:6px 10px 7px;
  border:1px solid rgba(255,255,255,.38);
  background:rgba(0,0,0,.42);
  text-align:center;
  pointer-events:none;
}
.placeLabel .en{
  display:block;
  font-size:11px;
  letter-spacing:.18em;
  opacity:.68;
  line-height:1.15;
}
.placeLabel .jp{
  display:block;
  margin-top:2px;
  font-size:15px;
  letter-spacing:.16em;
  line-height:1.2;
}
.label-story{left:50%;top:31%;transform:translate(-50%,-50%)}
.label-character{left:22%;top:64%;transform:translate(-50%,-50%)}
.label-guide{left:78%;top:64%;transform:translate(-50%,-50%)}
.label-home{left:50%;top:84%;transform:translate(-50%,-50%)}
.mapLink{
  position:absolute;
  z-index:30;
  display:block;
  border-radius:999px;
  -webkit-tap-highlight-color:transparent;
}
.mapLink::after{
  content:"";
  position:absolute;
  inset:10%;
  border-radius:999px;
  opacity:0;
  box-shadow:0 0 30px rgba(255,255,255,.9);
  transition:.18s ease;
  transform:scale(.9);
}
.mapLink:hover::after,.mapLink:active::after{opacity:1;transform:scale(1)}
.mapLink.current::before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  border-radius:999px;
  background:#d51d2a;
  box-shadow:0 0 18px rgba(255,0,0,.95);
  left:50%;
  top:72%;
  transform:translate(-50%,-50%);
  z-index:3;
}
.mapLink.home{left:39%;top:63%;width:22%;height:22%}
.mapLink.character{left:7%;top:37%;width:24%;height:28%}
.mapLink.story{left:38%;top:13%;width:24%;height:24%}
.mapLink.guide{right:7%;top:37%;width:24%;height:26%}

/* ===== glitch ===== */
body.glitching::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:999;
  pointer-events:none;
  background:
    linear-gradient(90deg,rgba(255,0,80,.22),transparent 32%,rgba(0,255,255,.18)),
    repeating-linear-gradient(0deg,rgba(255,255,255,.20) 0px,rgba(255,255,255,.20) 1px,transparent 2px,transparent 6px);
  mix-blend-mode:screen;
  animation:realGlitch .38s steps(2,end) 1;
}
body.glitching::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:1000;
  pointer-events:none;
  background:rgba(0,0,0,.28);
  animation:glitchDark .38s steps(2,end) 1;
}
@keyframes realGlitch{
  0%{opacity:0;transform:translate(0,0)}
  18%{opacity:.95;transform:translate(-6px,2px)}
  34%{opacity:.45;transform:translate(7px,-2px)}
  52%{opacity:.85;transform:translate(-3px,-4px)}
  72%{opacity:.55;transform:translate(4px,3px)}
  100%{opacity:0;transform:translate(0,0)}
}
@keyframes glitchDark{0%{opacity:0}30%{opacity:.7}60%{opacity:.3}100%{opacity:0}}

/* ===== page ===== */
.container{
  max-width:1180px;
  margin:0 auto;
  padding:50px 16px 80px;
  text-align:center;
}
.title-ruby{
  font-size:13px;
  letter-spacing:.35em;
  opacity:.55;
  margin-bottom:6px;
}
.page-title{
  font-size:38px;
  letter-spacing:.16em;
  margin:0;
  font-weight:300;
}
.switch{
  display:flex;
  margin:30px auto 24px;
  max-width:360px;
  border:1px solid rgba(255,255,255,.25);
}
.switch button{
  flex:1;
  padding:14px 0;
  background:none;
  border:none;
  color:#fff;
  letter-spacing:.22em;
  cursor:pointer;
}
.switch button.active{
  background:#1aa5a5;
  color:#000;
}

.characterSelect{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:12px;
  max-width:1040px;
  margin:0 auto 34px;
  animation:fadeUp .35s ease both;
}
.selectBtn{
  position:relative;
  aspect-ratio:1/1;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.04);
  padding:0;
  cursor:pointer;
  overflow:hidden;
  border-radius:12px;
  transition:.18s ease;
}
.selectBtn img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.selectBtn.active{
  border-color:var(--accent);
  box-shadow:0 0 26px color-mix(in srgb,var(--accent) 72%,transparent);
  transform:translateY(-2px);
}
.selectBtn:active{transform:scale(.98)}
.subPreparing{
  opacity:.6;
  letter-spacing:.25em;
  padding:80px 0;
  animation:fadeUp .35s ease both;
}

/* ===== profile ===== */
.profileArea{
  --accent:#4fbfc2;
  display:none;
  max-width:1080px;
  margin:0 auto;
  animation:fadeUp .45s ease both;
}
.profileArea.open{display:block}
.profileCard{
  position:relative;
  border:1px solid rgba(255,255,255,.13);
  background:rgba(10,10,14,.88);
  border-radius:18px;
  box-shadow:0 24px 90px rgba(0,0,0,.55);
  overflow:hidden;
  padding:22px;
}
.profileCard::before{
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  pointer-events:none;
}
.profileLayout{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:42% 58%;
  gap:8px;
  align-items:start;
}
.profileInfo{
  text-align:left;
  min-width:0;
  padding:10px 0 0 6px;
  animation:infoFade .32s ease both;
}
.profileInfo.fade{
  animation:infoFade .32s ease both;
}
@keyframes infoFade{
  from{opacity:0;transform:translateY(10px);filter:blur(3px)}
  to{opacity:1;transform:translateY(0);filter:blur(0)}
}
.profileNo{
  color:var(--accent);
  opacity:.82;
  letter-spacing:.22em;
  font-size:12px;
  margin-bottom:8px;
}
.charRuby{
  color:color-mix(in srgb,var(--accent) 82%,white 18%);
  font-size:clamp(12px,2.1vw,22px);
  letter-spacing:.12em;
  line-height:1.15;
  margin-left:3px;
}
.charName{
  color:var(--accent);
  font-size:clamp(38px,6.8vw,76px);
  letter-spacing:.04em;
  line-height:.98;
  margin:2px 0 16px;
  font-weight:300;
  text-shadow:0 0 24px color-mix(in srgb,var(--accent) 24%,transparent);
}
.charAge{
  color:#fff;
  font-size:clamp(30px,4.8vw,50px);
  line-height:1;
  margin:0 0 16px;
  text-align:center;
}
.profileMeta{
  color:rgba(255,255,255,.9);
  font-size:clamp(18px,3.1vw,30px);
  line-height:1.42;
  letter-spacing:.06em;
  margin-bottom:18px;
}
.metaRow{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:.48em;
  align-items:start;
}
.metaLabel{
  color:color-mix(in srgb,var(--accent) 82%,white 18%);
}
.profileText{
  color:color-mix(in srgb,var(--accent) 76%,white 24%);
  font-size:clamp(14px,2.3vw,21px);
  line-height:1.75;
  letter-spacing:.05em;
  text-align:left;
  margin:16px 0 0;
}
.profileHero{
  position:relative;
  min-height:610px;
  overflow:hidden;
  border-radius:16px;
}
.profileHero img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
.profileHeroImg{
  opacity:0;
  transform:translateX(-32px);
}
.profileHeroImg.enter{
  animation:heroIn .42s ease both;
}
.profileHeroImg.exit{
  animation:heroOut .3s ease both;
}
@keyframes heroIn{
  from{opacity:0;transform:translateX(-42px);filter:blur(4px)}
  to{opacity:1;transform:translateX(0);filter:blur(0)}
}
@keyframes heroOut{
  from{opacity:1;transform:translateX(0)}
  to{opacity:0;transform:translateX(44px);filter:blur(4px)}
}
.seasonBtns{
  display:flex;
  justify-content:flex-start;
  gap:14px;
  margin-top:22px;
}
.seasonBtn{
  min-width:112px;
  min-height:50px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid color-mix(in srgb,var(--accent) 70%,white 10%);
  background:rgba(255,255,255,.04);
  color:var(--accent);
  font-size:clamp(20px,3.4vw,32px);
  line-height:1;
  letter-spacing:.06em;
  cursor:pointer;
  transition:.18s ease;
}
.seasonBtn.active{
  background:var(--accent);
  color:#000;
  box-shadow:0 0 24px color-mix(in srgb,var(--accent) 70%,transparent);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

footer{
  padding:48px 16px 56px;
  text-align:center;
  background:rgba(0,0,0,.35);
  border-top:1px solid rgba(255,255,255,.1);
}
.footer-logo{
  width:min(260px,70vw);
  margin:0 auto 18px;
  display:block;
}
.footer-note{
  font-size:12px;
  opacity:.6;
  line-height:1.7;
  letter-spacing:.06em;
}

/* password */
.lockOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.74);
  opacity:0;
  pointer-events:none;
  transition:.22s ease;
  z-index:2000;
}
.lockOverlay.open{opacity:1;pointer-events:auto}
.lockBox{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  z-index:2001;
  opacity:0;
  pointer-events:none;
  transition:.22s ease;
}
.lockBox.open{opacity:1;pointer-events:auto}
.lockCard{
  width:min(92vw,420px);
  border:1px solid rgba(255,255,255,.16);
  background:rgba(10,10,14,.92);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-radius:16px;
  padding:18px 16px 16px;
  box-shadow:0 20px 70px rgba(0,0,0,.55);
  text-align:left;
}
.lockTitle{
  font-size:13px;
  letter-spacing:.22em;
  opacity:.75;
  margin:0 0 10px;
}
.lockRow{display:flex;align-items:center;gap:12px}
.lockLabel{
  font-size:12px;
  letter-spacing:.18em;
  opacity:.65;
  min-width:86px;
}
.lockField{
  flex:1;
  height:44px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  padding:0 12px;
  font-size:18px;
  letter-spacing:.22em;
}
.cursor{
  width:10px;
  height:18px;
  margin-left:2px;
  background:rgba(255,255,255,.8);
  animation:blink 1s steps(1,end) infinite;
  display:inline-block;
}
@keyframes blink{50%{opacity:0}}
.lockStatus{
  margin-top:12px;
  font-size:12px;
  letter-spacing:.18em;
  opacity:.7;
}
.lockStatus.ok{color:#8fffe6;opacity:.95}

@media(max-width:760px){
  .container{
    padding:42px 10px 70px;
  }
  .site-title{
    font-size:16px;
  }
  .page-title{
    font-size:30px;
  }
  .switch{
    margin:28px auto 22px;
  }
  .characterSelect{
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    max-width:100%;
    margin-bottom:24px;
  }
  .selectBtn{
    border-radius:7px;
  }
  .profileCard{
    padding:12px;
  }
  .profileCard::before{
    inset:7px;
  }
  .profileLayout{
    grid-template-columns:43% 57%;
    gap:2px;
  }
  .profileInfo{
    padding:6px 0 0 2px;
  }
  .profileNo{
    font-size:10px;
    margin-bottom:4px;
  }
  .charRuby{
    font-size:12px;
    letter-spacing:.08em;
  }
  .charName{
    font-size:38px;
    margin-bottom:10px;
  }
  .charAge{
    font-size:30px;
    margin-bottom:10px;
  }
  .profileMeta{
    font-size:18px;
    line-height:1.42;
    margin-bottom:10px;
  }
  .profileText{
    font-size:13px;
    line-height:1.72;
    margin-top:10px;
  }
  .profileHero{
    min-height:410px;
  }
  .seasonBtns{
    gap:10px;
    margin-top:16px;
  }
  .seasonBtn{
    min-width:72px;
    min-height:42px;
    padding:8px 12px;
    font-size:22px;
  }
}

@media(max-width:420px){
  .profileHero{
    min-height:390px;
  }
  .charName{
    font-size:34px;
  }
  .profileMeta{
    font-size:16px;
  }
  .profileText{
    font-size:12.5px;
  }
  .seasonBtn{
    min-width:66px;
    min-height:40px;
    font-size:20px;
  }
}
</style>
</head>

<body>

<header class="header">
  <a href="/" class="site-title">空想世界アリストテレス</a>
  <button class="menu-btn" id="menuBtn" aria-label="神殿案内図を開く">☰</button>
</header>

<div id="mapOverlay" class="mapOverlay" aria-hidden="true">
  <button class="mapClose" id="mapClose" type="button">✕</button>
  <div class="mapPanel">
    <img class="mapBase" src="/images/chizu/chizu.webp" alt="">
    <div class="mapCross"></div>
    <div class="mapCrossCenter"></div>
    <img class="mapSandou" src="/images/chizu/sandou.webp" alt="">

    <div class="mapTitleFrame"><div class="mapTitle">神殿案内図</div></div>

    <div class="placeLabel label-story"><span class="en">Story</span><span class="jp">聖堂</span></div>
    <div class="placeLabel label-character"><span class="en">Character</span><span class="jp">名簿録</span></div>
    <div class="placeLabel label-guide"><span class="en">Guide</span><span class="jp">資料庫</span></div>
    <div class="placeLabel label-home"><span class="en">Home</span><span class="jp">神殿入口</span></div>

    <a class="mapLink home" href="/"></a>
    <a class="mapLink character current" href="/character/"></a>
    <a class="mapLink story" href="/story/"></a>
    <a class="mapLink guide" href="/guide/"></a>

    <div class="mapNote">※アイコンを選択するとページへ移動します</div>
  </div>
</div>

<main class="container">
  <div class="title-ruby">character</div>
  <h1 class="page-title">空想世界 名簿記録</h1>

  <div class="switch">
    <button id="btnMain" class="active">MAIN</button>
    <button id="btnSub">SUB</button>
  </div>

  <div id="characterSelect" class="characterSelect"></div>

  <section id="profileArea" class="profileArea" aria-hidden="true">
    <div class="profileCard" id="profileCard">
      <div class="profileLayout">
        <div class="profileInfo" id="profileInfo">
          <div class="profileNo" id="profileNo">NO.01</div>
          <div class="charRuby" id="charRuby"></div>
          <h2 class="charName" id="charName"></h2>
          <div class="charAge" id="charAge"></div>
          <div id="metaText" class="profileMeta"></div>
          <div id="descText" class="profileText"></div>
          <div class="seasonBtns">
            <button id="btnS1" class="seasonBtn active" type="button">S1</button>
            <button id="btnS2" class="seasonBtn" type="button">S2</button>
          </div>
        </div>

        <div class="profileHero" id="profileHero">
          <img id="heroImg" class="profileHeroImg" src="" alt="">
        </div>
      </div>
    </div>
  </section>
</main>

<footer>
  <img src="/images/logo.png" class="footer-logo" alt="">
  <div class="footer-note">
    © 空想世界アリストテレス<br>
    当サイトの内容・文章・画像等の無断使用を固く禁じます。
  </div>
</footer>

<div class="lockOverlay" id="lockOverlay"></div>
<section class="lockBox" id="lockBox">
  <div class="lockCard">
    <div class="lockTitle">ACCESS AUTH</div>
    <div class="lockRow">
      <div class="lockLabel">PASSWORD</div>
      <div class="lockField"><span id="pwText"></span><span class="cursor"></span></div>
    </div>
    <div class="lockStatus" id="pwStatus">…</div>
  </div>
</section>

<script>
const characterSelect=document.getElementById("characterSelect");
const profileArea=document.getElementById("profileArea");
const profileInfo=document.getElementById("profileInfo");
const profileNo=document.getElementById("profileNo");
const heroImg=document.getElementById("heroImg");
const charRuby=document.getElementById("charRuby");
const charName=document.getElementById("charName");
const charAge=document.getElementById("charAge");
const descText=document.getElementById("descText");
const metaText=document.getElementById("metaText");
const btnMain=document.getElementById("btnMain");
const btnSub=document.getElementById("btnSub");
const btnS1=document.getElementById("btnS1");
const btnS2=document.getElementById("btnS2");

const lockOverlay=document.getElementById("lockOverlay");
const lockBox=document.getElementById("lockBox");

}

function openLock(){
  lockOverlay.classList.add("open");
  lockBox.classList.add("open");
  document.body.style.overflow="hidden";
}
function closeLock(){
  lockOverlay.classList.remove("open");
  lockBox.classList.remove("open");
  document.body.style.overflow="";
}

function applyAccent(idx){
  const a=accents[idx]||"#4fbfc2";
  profileArea.style.setProperty("--accent",a);
  document.querySelectorAll(".selectBtn").forEach(btn=>{
    btn.classList.remove("active");
    btn.style.removeProperty("--accent");
  });
  const active=document.querySelector(`.selectBtn[data-index="${idx}"]`);
  if(active){
    active.style.setProperty("--accent",a);
    active.classList.add("active");
  }
}
function setSeasonButtons(){
  btnS1.classList.toggle("active",currentSeason==="s1");
  btnS2.classList.toggle("active",currentSeason==="s2");
}
function parseMeta(meta){
  const parts=meta.split("/").map(v=>v.trim());
  const result={age:"",rows:[]};
  parts.forEach(part=>{
    const [label,...rest]=part.split("：");
    const cleanLabel=(label||"").trim();
    const value=rest.join("：").trim();
    if(cleanLabel==="年齢") result.age=value;
    else if(cleanLabel) result.rows.push({label:cleanLabel,value});
  });
  return result;
}
async function switchHero(src){
  heroImg.classList.remove("enter");
  heroImg.classList.add("exit");
  await sleep(260);
  heroImg.src=src;
  heroImg.classList.remove("exit");
  void heroImg.offsetWidth;
  heroImg.classList.add("enter");
}
function refreshInfoAnimation(){
  profileInfo.classList.remove("fade");
  void profileInfo.offsetWidth;
  profileInfo.classList.add("fade");
}
function loadCharacter(idx,season="s1",animate=true){
  currentIndex=idx;
  currentSeason=season;

  const data=(profiles[idx]&&profiles[idx][season])?profiles[idx][season]:profiles[0][season];
  const no=String(idx+1).padStart(2,"0");
  const name=names[idx]||names[0];
  const meta=parseMeta(data.meta);

  applyAccent(idx);
  setSeasonButtons();

  profileArea.classList.add("open");
  profileArea.setAttribute("aria-hidden","false");

  profileNo.textContent=`NO.${no}`;
  charRuby.textContent=name.ruby;
  charName.textContent=name.jp;
  charAge.textContent=meta.age || "";

  metaText.innerHTML=meta.rows.map(row=>`
    <div class="metaRow">
      <span class="metaLabel">${row.label}</span>
      <span>${row.value}</span>
    </div>
  `).join("");

  descText.textContent=data.desc;
  refreshInfoAnimation();

  const src=season==="s2"?heroS2[idx]:heroS1[idx];
  if(animate) switchHero(src);
  else{
    heroImg.src=src;
    heroImg.classList.add("enter");
  }
}

async function playPassword(idx){
  if(animRunning)return;
  animRunning=true;
  pwText.textContent="";
  pwStatus.textContent="…";
  pwStatus.className="lockStatus";

  openLock();
  await sleep(180);

  const code=passcodes[idx]||"0000";
  for(const c of code){
    pwText.textContent+=c;
    await sleep(95);
  }

  await sleep(120);
  pwStatus.textContent="COMPLETE";
  pwStatus.classList.add("ok");

  await sleep(260);
  closeLock();

  await sleep(120);
  loadCharacter(idx,"s1",true);

  animRunning=false;
}

characterSelect.addEventListener("click",e=>{
  const btn=e.target.closest(".selectBtn");
  if(!btn)return;
  playPassword(Number(btn.dataset.index));
});

btnS1.onclick=()=>loadCharacter(currentIndex,"s1",true);
btnS2.onclick=()=>loadCharacter(currentIndex,"s2",true);

/* ===== map menu ===== */
const menuBtn=document.getElementById("menuBtn");
const mapOverlay=document.getElementById("mapOverlay");
const mapClose=document.getElementById("mapClose");

function openMap(){
  document.body.classList.add("glitching");
  setTimeout(()=>{
    document.body.classList.remove("glitching");
    mapOverlay.classList.add("open");
    mapOverlay.setAttribute("aria-hidden","false");
    document.body.style.overflow="hidden";
  },420);
}
function closeMap(){
  mapOverlay.classList.remove("open");
  mapOverlay.setAttribute("aria-hidden","true");
  document.body.style.overflow="";
}
menuBtn.onclick=openMap;
mapClose.onclick=closeMap;
mapOverlay.addEventListener("click",e=>{if(e.target===mapOverlay)closeMap()});
window.addEventListener("keydown",e=>{if(e.key==="Escape")closeMap()});

document.querySelectorAll(".mapLink").forEach(link=>{
  link.addEventListener("click",e=>{
    e.preventDefault();
    location.href=link.href;
  });
});
