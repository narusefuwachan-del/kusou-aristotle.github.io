<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>空想世界アリストテレス神殿案内板</title>

  <link rel="icon" href="/favicon.png">
  <link rel="icon" href="/images/favicon.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; width:100%; min-height:100%; }
    body{
      font-family:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;
      line-height:1.8;
      color:#fff;
      background:#000;
      overflow-x:hidden;
    }

    /* ===== splash ===== */
    .splash{
      position:fixed;
      inset:0;
      background:#f5f7fb;
      display:grid;
      place-items:center;
      z-index:9999;
      opacity:1;
      transition:opacity 700ms ease;
    }
    .splash.hide{ opacity:0; pointer-events:none; }

    .splash-inner{
      opacity:0;
      transform:scale(1.08);
      transition:opacity 700ms ease, transform 700ms ease;
    }
    .splash.show .splash-inner{ opacity:1; transform:scale(1); }
    .splash.hide .splash-inner{ opacity:0; transform:scale(.82); }

    .splash-inner img{
      width:min(90vw,520px);
      height:auto;
      display:block;
    }

    /* ===== hero ===== */
    .hero{
      position:relative;
      z-index:2;
      height:100vh;
      overflow:hidden;
      background:#0b0b0f;
      isolation:isolate;
      transition:transform .45s ease, filter .45s ease;
    }

    .hero.map-opening{
      transform:scale(1.035);
      filter:contrast(1.08) saturate(1.08);
    }

    .hero-bg{
      position:absolute;
      inset:0;
      background:url("/images/home/sora.png") center / cover no-repeat;
      transform:scale(1.02);
      z-index:1;
    }

    .hero-torii{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:2;
      transform:scale(.86);
      opacity:0;
      filter:blur(1px);
      transition:
        transform 900ms cubic-bezier(.2,.9,.2,1),
        opacity 900ms cubic-bezier(.2,.9,.2,1),
        filter 900ms cubic-bezier(.2,.9,.2,1);
      transition-delay:120ms;
    }

    .hero-chara{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:3;
      transform:translateY(60px);
      opacity:0;
      transition:
        transform 900ms cubic-bezier(.2,.9,.2,1),
        opacity 900ms cubic-bezier(.2,.9,.2,1);
      transition-delay:520ms;
    }

    .hero.play .hero-torii{
      transform:scale(1);
      opacity:1;
      filter:blur(0);
    }
    .hero.play .hero-chara{
      transform:translateY(0);
      opacity:1;
    }

    /* ===== glitch ===== */
    body.glitching::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:999;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,0,80,.22), transparent 32%, rgba(0,255,255,.18)),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.20) 0px,
          rgba(255,255,255,.20) 1px,
          transparent 2px,
          transparent 6px
        );
      mix-blend-mode:screen;
      animation:realGlitch .38s steps(2,end) 1;
    }

    body.glitching::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:1000;
      pointer-events:none;
      background:rgba(0,0,0,.28);
      animation:glitchDark .38s steps(2,end) 1;
    }

    @keyframes realGlitch{
      0%{ opacity:0; transform:translate(0,0); }
      18%{ opacity:.95; transform:translate(-6px,2px); }
      34%{ opacity:.45; transform:translate(7px,-2px); }
      52%{ opacity:.85; transform:translate(-3px,-4px); }
      72%{ opacity:.55; transform:translate(4px,3px); }
      100%{ opacity:0; transform:translate(0,0); }
    }

    @keyframes glitchDark{
      0%{ opacity:0; }
      30%{ opacity:.7; }
      60%{ opacity:.3; }
      100%{ opacity:0; }
    }

    /* ===== black sections ===== */
    .section-black{
      min-height:100vh;
      background:#000;
      display:grid;
      place-items:center;
      padding:56px 16px;
    }
    .section-black img{
      width:min(980px,92vw);
      height:auto;
      display:block;
    }
    .welcome-img{ width:min(720px,90vw); }

    /* ===== header ===== */
    .header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:60;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:12px 16px;
      background:transparent;
      border:none;
    }
    .menu-btn{
      font-size:22px;
      background:none;
      border:none;
      cursor:pointer;
      color:#fff;
      padding:8px 10px;
      border-radius:10px;
      text-shadow:0 2px 18px rgba(0,0,0,.35);
    }
    .menu-btn:active{ transform:scale(.98); }

    /* ===== map overlay ===== */
    .mapOverlay{
      position:fixed;
      inset:0;
      z-index:1000;
      background:rgba(0,0,0,.76);
      opacity:0;
      pointer-events:none;
      transition:opacity .35s ease;
      display:grid;
      place-items:center;
      padding:18px;
    }
    .mapOverlay.open{
      opacity:1;
      pointer-events:auto;
    }

    .mapPanel{
      position:relative;
      width:min(96vw,720px);
      aspect-ratio:1/1;
      opacity:0;
      transform:scale(.96);
      transition:opacity .42s ease, transform .42s ease;
      filter:drop-shadow(0 24px 80px rgba(0,0,0,.75));
    }
    .mapOverlay.open .mapPanel{
      opacity:1;
      transform:scale(1);
    }

    .mapBase{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      z-index:1;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    .mapCross{
      position:absolute;
      left:50%;
      top:50%;
      width:54%;
      height:54%;
      transform:translate(-50%,-50%);
      z-index:2;
      pointer-events:none;
    }

    .mapCross::before,
    .mapCross::after{
      content:"";
      position:absolute;
      background:rgba(255,255,255,.78);
      box-shadow:0 0 16px rgba(255,255,255,.55);
      border-radius:999px;
    }

    .mapCross::before{
      left:50%;
      top:0;
      width:2px;
      height:100%;
      transform:translateX(-50%);
    }

    .mapCross::after{
      left:0;
      top:50%;
      width:100%;
      height:2px;
      transform:translateY(-50%);
    }

    .mapCrossCenter{
      position:absolute;
      left:50%;
      top:50%;
      z-index:3;
      width:28px;
      height:28px;
      transform:translate(-50%,-50%) rotate(45deg);
      border:1px solid rgba(255,255,255,.72);
      box-shadow:0 0 16px rgba(255,255,255,.45);
      pointer-events:none;
    }

    .mapSandou{
      position:absolute;
      left:50%;
      top:50%;
      width:30%;
      height:auto;
      transform:translate(-50%,-50%);
      z-index:4;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter:drop-shadow(0 0 16px rgba(255,255,255,.22));
      opacity:.96;
    }

    .mapTitleFrame{
      position:absolute;
      left:50%;
      top:4%;
      transform:translateX(-50%);
      z-index:20;
      min-width:38%;
      padding:6px 16px 7px;
      border:1px solid rgba(255,255,255,.42);
      background:rgba(0,0,0,.34);
      box-shadow:
        0 0 18px rgba(255,255,255,.12),
        inset 0 0 18px rgba(255,255,255,.06);
      text-align:center;
      pointer-events:none;
    }

    .mapTitle{
      font-size:clamp(16px,3.8vw,28px);
      letter-spacing:.18em;
      text-shadow:0 0 16px rgba(255,255,255,.35);
      white-space:nowrap;
    }

    .mapNote{
      position:absolute;
      left:0;
      right:0;
      bottom:5.5%;
      z-index:20;
      text-align:center;
      font-size:clamp(10px,2.5vw,14px);
      letter-spacing:.08em;
      opacity:.78;
      pointer-events:none;
      text-shadow:0 0 12px rgba(0,0,0,.9);
    }

    .mapClose{
      position:fixed;
      top:14px;
      right:16px;
      z-index:1010;
      width:42px;
      height:42px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(0,0,0,.45);
      color:#fff;
      font-size:20px;
      cursor:pointer;
    }

    .placeLabel{
      position:absolute;
      z-index:22;
      min-width:96px;
      padding:6px 12px 7px;
      border:1px solid rgba(255,255,255,.38);
      background:rgba(0,0,0,.42);
      box-shadow:
        0 0 14px rgba(255,255,255,.10),
        inset 0 0 12px rgba(255,255,255,.05);
      text-align:center;
      pointer-events:none;
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
    }

    .placeLabel .en{
      display:block;
      font-size:clamp(9px,2.1vw,12px);
      letter-spacing:.18em;
      opacity:.68;
      line-height:1.15;
    }

    .placeLabel .jp{
      display:block;
      margin-top:2px;
      font-size:clamp(13px,3vw,17px);
      letter-spacing:.16em;
      line-height:1.2;
    }

    .label-story{
      left:50%;
      top:31%;
      transform:translate(-50%,-50%);
    }
    .label-character{
      left:22%;
      top:64%;
      transform:translate(-50%,-50%);
    }
    .label-guide{
      left:78%;
      top:64%;
      transform:translate(-50%,-50%);
    }
    .label-home{
      left:50%;
      top:84%;
      transform:translate(-50%,-50%);
    }

    .mapLink{
      position:absolute;
      z-index:30;
      display:block;
      border-radius:999px;
      -webkit-tap-highlight-color:transparent;
    }

    .mapLink::after{
      content:"";
      position:absolute;
      inset:10%;
      border-radius:999px;
      opacity:0;
      box-shadow:0 0 30px rgba(255,255,255,.9);
      transition:opacity .18s ease, transform .18s ease;
      transform:scale(.9);
    }

    .mapLink:hover::after,
    .mapLink:active::after{
      opacity:1;
      transform:scale(1);
    }

    .mapLink.current::before{
      content:"";
      position:absolute;
      width:18px;
      height:18px;
      border-radius:999px;
      background:#d51d2a;
      box-shadow:0 0 18px rgba(255,0,0,.95);
      left:50%;
      top:72%;
      transform:translate(-50%,-50%);
      z-index:3;
    }

    .mapLink.home{
      left:39%;
      top:63%;
      width:22%;
      height:22%;
    }
    .mapLink.character{
      left:7%;
      top:37%;
      width:24%;
      height:28%;
    }
    .mapLink.story{
      left:38%;
      top:13%;
      width:24%;
      height:24%;
    }
    .mapLink.guide{
      right:7%;
      top:37%;
      width:24%;
      height:26%;
    }

    .mapLink.loading::after{
      opacity:1;
      transform:scale(1.12);
      box-shadow:0 0 42px rgba(255,255,255,.95);
    }

    /* ===== BGM ===== */
    .bgm-btn{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:900;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.20);
      border-radius:999px;
      background:rgba(20,20,20,.72);
      color:#fff;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      font-weight:700;
      font-size:14px;
      cursor:pointer;
    }
    .bgm-btn:active{ transform:scale(.98); }
    .bgm-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.35);
    }
    .bgm-btn.on .bgm-dot{ background:rgba(120,255,180,.95); }
    .bgm-btn small{ font-weight:700; opacity:.92; }

    /* ===== footer ===== */
    .footer{
      position:relative;
      z-index:5;
      padding:44px 16px 56px;
      text-align:center;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-top:1px solid rgba(255,255,255,.10);
    }

    .footer-inner{
      max-width:960px;
      margin:0 auto;
    }

    .footer-logo{
      width:min(64vw,260px);
      height:auto;
      display:block;
      margin:0 auto 18px;
      opacity:.92;
      filter:drop-shadow(0 8px 28px rgba(0,0,0,.45));
    }

    .footer-title{
      margin:0 0 10px;
      font-weight:800;
      letter-spacing:.08em;
      font-size:13px;
      color:rgba(255,255,255,.78);
    }

    .footer-sns{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
      margin:12px 0 6px;
    }

    .share{
      margin:10px 0 18px;
      display:grid;
      gap:10px;
      justify-items:center;
    }

    .share-row{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .sns-btn{
      width:44px;
      height:44px;
      border-radius:999px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
      color:#fff;
      text-decoration:none;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
    }

    .sns-btn:active{ transform:scale(.98); }

    .sns-btn:hover{
      background:rgba(255,255,255,.10);
      border-color:rgba(255,255,255,.28);
    }

    .icon-img{
      width:22px;
      height:22px;
      object-fit:contain;
      display:block;
      opacity:.92;
    }

    .footer-note{
      margin-top:18px;
      font-size:12px;
      color:rgba(255,255,255,.60);
      letter-spacing:.03em;
    }

    @media(max-width:520px){
      .mapPanel{ width:min(98vw,620px); }

      .mapTitleFrame{
        top:4%;
        min-width:48%;
        padding:5px 12px 6px;
      }

      .placeLabel{
        min-width:76px;
        padding:5px 8px 6px;
      }

      .label-story{ top:31%; }
      .label-character{ left:21%; top:65%; }
      .label-guide{ left:79%; top:65%; }
      .label-home{ top:85%; }

      .mapNote{ bottom:4.6%; }
      .mapSandou{ width:31%; }
      .mapCross{ width:55%; height:55%; }
    }

    @media(prefers-reduced-motion:reduce){
      .splash,
      .splash-inner,
      .hero,
      .mapOverlay,
      .mapPanel,
      .mapLink::after{
        transition:none;
        animation:none;
      }
      body.glitching::before,
      body.glitching::after{
        animation:none;
        opacity:0;
      }
    }
  </style>
</head>

<body>
  <section class="hero" id="hero" aria-label="メインビジュアル">
    <div class="hero-bg"></div>
    <img src="/images/home/torii.png" class="hero-torii" alt="">
    <img src="/images/home/tatie.png" class="hero-chara" alt="">
  </section>

  <div id="splash" class="splash" aria-label="読み込み中">
    <div class="splash-inner">
      <img src="/images/logo.png" alt="空想世界アリストテレス">
    </div>
  </div>

  <header class="header">
    <button class="menu-btn" id="menuBtn" aria-label="神殿案内図を開く">☰</button>
  </header>

  <div id="mapOverlay" class="mapOverlay" aria-hidden="true">
    <button class="mapClose" id="mapClose" type="button" aria-label="神殿案内図を閉じる">✕</button>

    <div class="mapPanel" role="dialog" aria-modal="true" aria-label="神殿案内図">
      <img class="mapBase" src="/images/chizu/chizu.webp" alt="">
      <div class="mapCross" aria-hidden="true"></div>
      <div class="mapCrossCenter" aria-hidden="true"></div>
      <img class="mapSandou" src="/images/chizu/sandou.webp" alt="">

      <div class="mapTitleFrame">
        <div class="mapTitle">神殿案内図</div>
      </div>

      <div class="placeLabel label-story">
        <span class="en">Story</span>
        <span class="jp">聖堂</span>
      </div>

      <div class="placeLabel label-character">
        <span class="en">Character</span>
        <span class="jp">名簿録</span>
      </div>

      <div class="placeLabel label-guide">
        <span class="en">Guide</span>
        <span class="jp">資料庫</span>
      </div>

      <div class="placeLabel label-home">
        <span class="en">Home</span>
        <span class="jp">神殿入口</span>
      </div>

      <a class="mapLink home current" href="/" aria-label="神殿入口 Home"></a>
      <a class="mapLink character" href="/character/" aria-label="名簿録 Character"></a>
      <a class="mapLink story" href="/story/" aria-label="聖堂 Story"></a>
      <a class="mapLink guide" href="/guide/" aria-label="資料庫 Guide"></a>

      <div class="mapNote">※アイコンを選択するとページへ移動します</div>
    </div>
  </div>

  <section class="section-black" aria-label="ようこそ">
    <img src="/images/home/welcome.png" class="welcome-img" alt="ようこそ、空想世界アリストテレスへ">
  </section>

  <section class="section-black" aria-label="ノイズ文字">
    <img src="/images/home/noise-text.png" alt="">
  </section>

  <audio id="bgm" preload="auto" loop>
    <source src="/audio/bgm.mp3" type="audio/mpeg">
  </audio>

  <button class="bgm-btn" id="bgmBtn" type="button" aria-label="BGMの切り替え">
    <span class="bgm-dot" aria-hidden="true"></span>
    <small id="bgmLabel">BGM OFF</small>
  </button>

  <footer class="footer" aria-label="フッター">
    <div class="footer-inner">
      <img class="footer-logo" src="/images/logo.png" alt="空想世界アリストテレス">

      <div class="share" aria-label="シェア">
        <div class="footer-title">SHARE</div>
        <div class="share-row">
          <a class="sns-btn" id="shareX" href="#" target="_blank" rel="noopener" aria-label="Xでシェア">
            <img class="icon-img" src="/images/icons/x.png" alt="" aria-hidden="true">
          </a>

          <a class="sns-btn" id="shareLINE" href="#" target="_blank" rel="noopener" aria-label="LINEでシェア">
            <img class="icon-img" src="/images/icons/line.png" alt="" aria-hidden="true">
          </a>
        </div>
      </div>

      <div class="footer-title">OFFICIAL</div>
      <div class="footer-sns" aria-label="公式SNS">
        <a class="sns-btn" href="https://x.com/passion_fruit_k" target="_blank" rel="noopener" aria-label="X">
          <img class="icon-img" src="/images/icons/x.png" alt="" aria-hidden="true">
        </a>

        <a class="sns-btn" href="https://youtube.com/@sui_umbrella?si=X8r31ZXZss5eDUuo" target="_blank" rel="noopener" aria-label="YouTube">
          <img class="icon-img" src="/images/icons/youtube.png" alt="" aria-hidden="true">
        </a>

        <a class="sns-btn" href="https://story.nola-novel.com/user/U-07607a98-c293-4543-b10c-e61e6c90f927" target="_blank" rel="noopener" aria-label="Nola">
          <img class="icon-img" src="/images/icons/nola.png" alt="" aria-hidden="true">
        </a>
      </div>

      <div class="footer-note">
        © 空想世界アリストテレス<br>
        当サイトに掲載されている文章・画像等の無断転載、無断使用を固く禁じます。
      </div>
    </div>
  </footer>

  <script>
    (() => {
      const url = encodeURIComponent(location.href);
      const title = encodeURIComponent(document.title);

      const shareX = document.getElementById("shareX");
      const shareLINE = document.getElementById("shareLINE");

      if (shareX) shareX.href = `https://x.com/intent/tweet?text=${title}&url=${url}`;
      if (shareLINE) shareLINE.href = `https://social-plugins.line.me/lineit/share?url=${url}`;
    })();

    const hero = document.getElementById("hero");
    const mapOverlay = document.getElementById("mapOverlay");
    const menuBtn = document.getElementById("menuBtn");
    const mapClose = document.getElementById("mapClose");

    const openMap = () => {
      document.body.classList.add("glitching");

      if(hero){
        hero.classList.add("map-opening");
      }

      setTimeout(() => {
        document.body.classList.remove("glitching");
        if(hero) hero.classList.remove("map-opening");

        mapOverlay.classList.add("open");
        mapOverlay.setAttribute("aria-hidden","false");
        document.body.style.overflow = "hidden";
      }, 420);
    };

    const closeMap = () => {
      mapOverlay.classList.remove("open");
      mapOverlay.setAttribute("aria-hidden","true");
      document.body.style.overflow = "";
    };

    menuBtn.addEventListener("click", openMap);
    mapClose.addEventListener("click", closeMap);

    mapOverlay.addEventListener("click", (e)=>{
      if(e.target === mapOverlay) closeMap();
    });

    window.addEventListener("keydown", (e)=>{
      if(e.key === "Escape" && mapOverlay.classList.contains("open")){
        closeMap();
      }
    });

    document.querySelectorAll(".mapLink").forEach(link=>{
      link.addEventListener("click", e=>{
        e.preventDefault();
        const href = link.getAttribute("href");
        link.classList.add("loading");
        setTimeout(()=>{ location.href = href; }, 220);
      });
    });

    const bgm = document.getElementById("bgm");
    const bgmBtn = document.getElementById("bgmBtn");
    const bgmLabel = document.getElementById("bgmLabel");
    const DEFAULT_VOLUME = 0.35;

    bgm.volume = DEFAULT_VOLUME;
    const saved = localStorage.getItem("bgm_on") === "1";

    function setBgmUI(isOn){
      bgmBtn.classList.toggle("on", isOn);
      bgmLabel.textContent = isOn ? "BGM ON" : "BGM OFF";
    }
    setBgmUI(saved);

    bgmBtn.addEventListener("click", async () => {
      try{
        if (bgm.paused){
          bgm.volume = DEFAULT_VOLUME;
          await bgm.play();
          localStorage.setItem("bgm_on", "1");
          setBgmUI(true);
        }else{
          bgm.pause();
          localStorage.setItem("bgm_on", "0");
          setBgmUI(false);
        }
      }catch(e){
        alert("BGMを再生できませんでした。もう一度タップしてみて！");
      }
    });

    function startHeroAnimation(){
      if (!hero) return;

      hero.classList.remove("play");
      void hero.offsetWidth;
      requestAnimationFrame(() => hero.classList.add("play"));
    }

    function startSplashSequence(){
      const splash = document.getElementById("splash");

      if (splash){
        splash.classList.remove("hide");
        requestAnimationFrame(() => splash.classList.add("show"));
      }

      setTimeout(() => {
        startHeroAnimation();

        if (splash){
          splash.classList.add("hide");
          splash.classList.remove("show");
          setTimeout(() => splash.remove(), 750);
        }
      }, 1200);

      setTimeout(() => {
        const s = document.getElementById("splash");
        if (s) s.remove();
      }, 3000);
    }

    window.addEventListener("load", startSplashSequence);

    window.addEventListener("pageshow", (e) => {
      if (e.persisted){
        startHeroAnimation();
      }
    });
  </script>
</body>
</html>
